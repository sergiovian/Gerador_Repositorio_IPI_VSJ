<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#c8102e"><title>Entrar · Louvor Inteligente</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/app.css" rel="stylesheet"><link href="assets/css/login.css" rel="stylesheet"></head><body class="login-page"><main class="login-shell"><section class="login-hero"><div class="login-brand"><img src="assets/img/logo-ipi.jpg" alt="IPI Vila São José"><span>Louvor Inteligente</span></div><div class="login-hero-copy"><h2>Organize cada momento de louvor.</h2><p>Repertórios, músicas e histórico em um só lugar para servir melhor à sua igreja.</p></div><small class="position-relative z-1">IPI Vila São José</small></section><section class="login-panel"><div class="login-card"><img class="login-logo mb-4" src="assets/img/logo-ipi.jpg" alt="Logo da igreja"><p class="login-kicker mb-2">Acesso seguro</p><h1 id="title" class="h2 mb-2">Bem-vindo de volta</h1><p id="subtitle" class="text-secondary mb-4">Entre para acessar o repertório da sua igreja.</p><form id="login-form"><div class="mb-3"><label class="form-label" for="username">Usuário</label><input class="form-control" id="username" autocomplete="username" required autofocus></div><div class="mb-3"><label class="form-label" for="password">Senha</label><input class="form-control" id="password" type="password" autocomplete="current-password" required></div><p id="login-error" class="text-danger small d-none"></p><button class="btn login-button w-100">Entrar no portal</button><button class="btn btn-link login-switch w-100 mt-2" type="button" id="show-register">Cadastrar minha igreja</button></form><form id="register-form" class="d-none"><div class="mb-2"><label class="form-label">Nome da igreja</label><input class="form-control" name="churchName" required></div><div class="mb-2"><label class="form-label">Responsável</label><input class="form-control" name="responsibleName" required></div><div class="mb-2"><label class="form-label">E-mail</label><input class="form-control" name="email" type="email" required></div><div class="mb-2"><label class="form-label">Usuário</label><input class="form-control" name="username" required></div><div class="mb-3"><label class="form-label">Senha</label><input class="form-control" name="password" type="password" minlength="6" required></div><p id="register-error" class="text-danger small d-none"></p><button class="btn login-button w-100">Criar igreja</button><button class="btn btn-link login-switch w-100 mt-2" type="button" id="show-login">Já tenho acesso</button></form></div></section></main><script>const login=document.querySelector('#login-form'),register=document.querySelector('#register-form');function error(id,message){const el=document.querySelector(id);el.textContent=message;el.classList.remove('d-none')}async function send(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),json=await r.json().catch(()=>({}));if(!r.ok)throw new Error(json.error?.message||json.message||'Não foi possível concluir.');location='/'}login.onsubmit=async e=>{e.preventDefault();try{await send('/api/auth/user-login',{username:username.value,password:password.value})}catch(err){error('#login-error',err.message)}};register.onsubmit=async e=>{e.preventDefault();try{await send('/api/auth/register',Object.fromEntries(new FormData(register)))}catch(err){error('#register-error',err.message)}};document.querySelector('#show-register').onclick=()=>{login.classList.add('d-none');register.classList.remove('d-none');title.textContent='Cadastre sua igreja';subtitle.textContent='Crie o primeiro acesso administrativo.'};document.querySelector('#show-login').onclick=()=>{register.classList.add('d-none');login.classList.remove('d-none');title.textContent='Bem-vindo de volta';subtitle.textContent='Entre para acessar o repertório da sua igreja.'};</script></body></html>
