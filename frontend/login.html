<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#c8102e"><title>Entrar · Louvor Inteligente</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/app.css" rel="stylesheet"><link href="assets/css/login.css" rel="stylesheet"></head><body class="login-page"><main class="login-shell"><section class="login-hero"><div class="login-brand"><img src="assets/img/logo-ipi.jpg" alt="IPI Vila São José"><span>Louvor Inteligente</span></div><div class="login-hero-copy"><h2>Organize cada momento de louvor.</h2><p>Repertórios, músicas e histórico em um só lugar.</p></div></section><section class="login-panel"><div class="login-card"><img class="login-logo mb-4" src="assets/img/logo-ipi.jpg" alt="Logo da igreja"><p class="login-kicker mb-2">Acesso seguro</p><h1 class="h2 mb-2">Bem-vindo</h1><p class="text-secondary mb-4">Entre para acessar o repertório.</p><form id="login-form"><div class="mb-3"><label class="form-label">Usuário</label><input class="form-control" id="username" required autofocus></div><div class="mb-3"><label class="form-label">Senha</label><input class="form-control" id="password" type="password" required></div><p id="error" class="text-danger small d-none"></p><button class="btn login-button w-100">Entrar no portal</button></form></div></section></main><script>const next=new URLSearchParams(location.search).get('next')||'/';document.querySelector('#login-form').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/auth/user-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})}),j=await r.json().catch(()=>({}));if(!r.ok){error.textContent=j.error?.message||j.message||'Não foi possível entrar.';error.classList.remove('d-none');return}location=next};</script></body></html>
