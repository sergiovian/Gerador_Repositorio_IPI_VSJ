<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Louvores IPI Vila São José</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/app.css" rel="stylesheet"></head><body class="login-page"><main class="login-shell"><section class="login-hero"></section><section class="login-panel"><div class="login-card"><img class="login-logo" src="assets/img/logo-ipi.jpg" alt="Logo IPI"><p class="eyebrow">Igreja Presbiteriana Independente</p><h1>Louvores IPI<br>Vila São José</h1><p>Organize músicas, cultos e repertórios.</p><form id="login-form"><label class="form-label" for="password">Senha de acesso</label><input class="form-control form-control-lg" id="password" type="password" inputmode="numeric" required autofocus><p id="login-error" class="text-danger small mt-2 d-none"></p><button class="btn login-button w-100 mt-2">Entrar</button></form></div></section></main><script>document.querySelector('#login-form').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:password.value})});if(r.ok)location='/';else{loginError.textContent='Senha incorreta.';loginError.classList.remove('d-none')}};const loginError=document.querySelector('#login-error')</script></body></html>
