<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projeção</title><style>:root{--projection-font:Arial,sans-serif;--projection-text:#fff;--projection-title:#ffcc4d}body{margin:0;background:#070707;color:var(--projection-text);font-family:var(--projection-font);text-align:center}#projection-root{min-height:100vh;display:grid;place-items:center;padding:8vw;box-sizing:border-box}.projection-content{max-width:1300px}.projection-content h1{margin:0 0 1.2rem;color:var(--projection-title);font:700 clamp(1.6rem,3.3vw,3.5rem)/1.15 var(--projection-font)}pre{font:clamp(1.5rem,3.4vw,3.5rem)/1.35 var(--projection-font);white-space:pre-wrap;margin:0;max-width:1300px}.choice pre{font-size:clamp(1.4rem,2.8vw,2.8rem);color:#f4d9df}.projection-content small{display:block;margin-top:2rem;color:#777}.hint{position:fixed;bottom:15px;right:18px;color:#777}#projection-fullscreen,#projection-style-toggle{border:1px solid #ffffff66;border-radius:10px;padding:.65rem .9rem;color:#fff;background:#141414dd;font:600 14px Arial;cursor:pointer}#projection-fullscreen{position:fixed;z-index:20;top:18px;right:18px}#projection-fullscreen span{font-size:18px;vertical-align:-1px;margin-right:5px}#projection-fullscreen.hidden{display:none}#projection-style-panel{position:fixed;z-index:21;top:70px;right:18px;text-align:left}#projection-style-form{width:240px;margin-top:8px;padding:12px;border:1px solid #ffffff30;border-radius:12px;background:#191919f2;box-shadow:0 10px 30px #0008;font:13px Arial}#projection-style-form.hidden{display:none}#projection-style-form label{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;color:#eee}#projection-style-form select{max-width:130px;padding:5px;border-radius:5px}#projection-style-form input[type=color]{width:42px;height:28px;padding:1px;border:0;background:none}#projection-style-form label.check{justify-content:flex-start}.check input{width:auto}#projection-style-form button{width:100%;border:0;border-radius:7px;padding:8px;background:#c8102e;color:#fff;font-weight:700;cursor:pointer}</style></head><body><main id="projection-root">Carregando…</main><span class="hint">Gestor de Cultos</span><script src="/assets/js/projection-style.js?v=1"></script><script src="/assets/js/projection.js?v=7"></script><script src="/assets/js/projection-fullscreen.js?v=1"></script></body></html>
