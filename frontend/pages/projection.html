<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projeção</title><style>body{margin:0;background:#070707;color:white;font-family:Arial;text-align:center}#screen{min-height:100vh;display:grid;place-items:center;padding:8vw;box-sizing:border-box}h1{font-size:clamp(2rem,6vw,5.5rem);margin:0 0 1rem}pre{font:clamp(1.5rem,3.4vw,3.5rem)/1.35 Arial;white-space:pre-wrap;margin:0;max-width:1300px}.hint{position:fixed;bottom:15px;right:18px;color:#777}</style></head><body><main id="screen">Carregando…</main><span class="hint">Louvor Inteligente</span><script>const id=new URLSearchParams(location.search).get('repertoire'),api=p=>fetch('/api'+p).then(r=>r.json()).then(x=>x.data);let signature='';async function render(){try{const[r,state]=await Promise.all([api('/repertoires/'+id),api('/projection/'+id+'/state')]),item=r.items[state.position-1];if(!item)return;if(state.blackout){screen.innerHTML='';return}const music=await api('/music/'+item.music_id),next=item.title+state.blackout;if(signature===next)return;signature=next;screen.innerHTML='<div><h1>'+item.title+'</h1><pre>'+((music.lyrics||'Letra não cadastrada.').replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))+'</pre></div>'}catch(e){screen.textContent=e.message}}render();setInterval(render,1000)</script></body></html>
