<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Controle de Projeção</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-3"><h1 class="h4">Controle de projeção</h1><div id="now" class="card p-3 mb-3"></div><div class="d-flex gap-2 mb-2"><button id="backSlide" class="btn btn-outline-secondary flex-fill">← Estrofe</button><button id="nextSlide" class="btn btn-primary flex-fill">Estrofe →</button></div><div class="d-flex gap-2 mb-3"><button id="prev" class="btn btn-outline-secondary flex-fill">← Música</button><button id="next" class="btn btn-outline-primary flex-fill">Música →</button></div><button id="black" class="btn btn-dark w-100 mb-3">Tela preta</button><div id="list" class="list-group"></div></main><script>const id=new URLSearchParams(location.search).get('repertoire'),api=(p,o)=>fetch('/api'+p,{headers:{'Content-Type':'application/json'},...o}).then(async r=>{const x=await r.json();if(!r.ok)throw Error(x.error?.message);return x.data}),split=x=>String(x||'').split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean);let rep,state,parts=[];async function load(){[rep,state]=await Promise.all([api('/repertoires/'+id),api('/projection/'+id+'/state')]);const item=rep.items[state.position-1],music=await api('/music/'+item.music_id);parts=split(music.lyrics);now.innerHTML='<strong>'+state.position+'. '+item.title+'</strong><br><small>Estrofe '+(Math.min(state.slide+1,Math.max(1,parts.length)))+' de '+Math.max(1,parts.length)+'</small>';black.textContent=state.blackout?'Mostrar projeção':'Tela preta';list.innerHTML=rep.items.map((x,i)=>'<button class="list-group-item '+(i+1===state.position?'active':'')+'" data-p="'+(i+1)+'">'+(i+1)+'. '+x.title+'</button>').join('');list.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>save(+b.dataset.p,0,false))}async function save(position=state.position,slide=state.slide,blackout=state.blackout){await api('/projection/'+id+'/state',{method:'PUT',body:JSON.stringify({position,slide,blackout})});load()}backSlide.onclick=()=>save(state.position,Math.max(0,state.slide-1),false);nextSlide.onclick=()=>state.slide<parts.length-1?save(state.position,state.slide+1,false):save(Math.min(rep.items.length,state.position+1),0,false);prev.onclick=()=>save(Math.max(1,state.position-1),0,false);next.onclick=()=>save(Math.min(rep.items.length,state.position+1),0,false);black.onclick=()=>save(state.position,state.slide,!state.blackout);load()</script></body></html>
