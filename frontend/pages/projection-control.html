<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Controle de Projeção</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-3" style="max-width:720px"><h1 class="h4 mb-3">Controle de projeção</h1><div id="now" class="card p-3 mb-3"></div><div id="choice" class="d-none card border-primary p-3 mb-3"><strong class="mb-2">A música terminou</strong><div class="d-flex gap-2"><button id="another" class="btn btn-primary flex-fill">Outra música</button><button id="returnLiturgy" class="btn btn-outline-primary flex-fill">Voltar à liturgia</button></div></div><div class="d-flex gap-2 mb-2"><button id="backSlide" class="btn btn-outline-secondary flex-fill">← Página</button><button id="nextSlide" class="btn btn-primary flex-fill">Página →</button></div><div class="d-flex gap-2 mb-3"><button id="showLiturgy" class="btn btn-outline-secondary flex-fill">Liturgia</button><button id="showMusic" class="btn btn-outline-primary flex-fill">Músicas</button></div><button id="black" class="btn btn-dark w-100 mb-3">Tela preta</button><div id="list" class="list-group"></div></main><script>const id=new URLSearchParams(location.search).get('repertoire'),api=(path,options)=>fetch('/api'+path,{headers:{'Content-Type':'application/json'},...options}).then(async response=>{const json=await response.json();if(!response.ok)throw Error(json.error?.message);return json.data}),split=text=>String(text||'').split(/\n\s*\n+/).map(value=>value.trim()).filter(Boolean);let rep,state,parts=[];async function load(){[rep,state]=await Promise.all([api('/repertoires/'+id),api('/projection/'+id+'/state')]);choice.classList.toggle('d-none',state.mode!=='CHOICE');let title='',sub='';if(state.mode==='LITURGY'){const page=rep.liturgy?.[state.liturgyIndex];title='Liturgia';sub=page?`${state.liturgyIndex+1}. ${page.title}`:'Nenhuma página selecionada';list.innerHTML=(rep.liturgy||[]).map((page,index)=>`<button class="list-group-item ${index===state.liturgyIndex?'active':''}" data-l="${index}">${index+1}. ${page.title}</button>`).join('');list.querySelectorAll('[data-l]').forEach(button=>button.onclick=()=>save({mode:'LITURGY',liturgyIndex:+button.dataset.l,slide:0,blackout:false}))}else{const item=rep.items[state.position-1],music=item&&await api('/music/'+item.music_id);parts=split(music?.lyrics);title=state.mode==='CHOICE'?'Escolha o próximo passo':(item?.title||'Música');sub=state.mode==='CHOICE'?'Use os botões abaixo.':`Estrofe ${Math.min(state.slide+1,Math.max(1,parts.length))} de ${Math.max(1,parts.length)}`;list.innerHTML=rep.items.map((item,index)=>`<button class="list-group-item ${state.mode==='MUSIC'&&index+1===state.position?'active':''}" data-p="${index+1}">${index+1}. ${item.title}</button>`).join('');list.querySelectorAll('[data-p]').forEach(button=>button.onclick=()=>save({mode:'MUSIC',position:+button.dataset.p,slide:0,blackout:false}))}now.innerHTML=`<strong>${title}</strong><br><small>${sub}</small>`;black.textContent=state.blackout?'Mostrar projeção':'Tela preta'}async function save(change={}){await api('/projection/'+id+'/state',{method:'PUT',body:JSON.stringify({...state,...change})});load()}backSlide.onclick=()=>state.mode==='LITURGY'?save({liturgyIndex:Math.max(0,state.liturgyIndex-1),blackout:false}):save({slide:Math.max(0,state.slide-1),blackout:false});nextSlide.onclick=()=>{if(state.mode==='LITURGY')return save({liturgyIndex:Math.min(Math.max(0,(rep.liturgy?.length||1)-1),state.liturgyIndex+1),blackout:false});if(state.mode==='MUSIC'&&state.slide<parts.length-1)return save({slide:state.slide+1,blackout:false});if(state.mode==='MUSIC')return save({mode:'CHOICE',blackout:false})};showLiturgy.onclick=()=>save({mode:'LITURGY',liturgyIndex:state.liturgyIndex||0,blackout:false});showMusic.onclick=()=>save({mode:'MUSIC',position:state.position||1,slide:0,blackout:false});another.onclick=()=>save({mode:'MUSIC',slide:0,blackout:false});returnLiturgy.onclick=()=>save({mode:'LITURGY',liturgyIndex:state.liturgyIndex||0,blackout:false});black.onclick=()=>save({blackout:!state.blackout});load()</script></body></html>
