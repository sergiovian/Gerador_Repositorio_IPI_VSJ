<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Controle de Projeção</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><main class="container py-3"><h1 class="h4">Controle de projeção</h1><p class="text-secondary">Use este celular para controlar o projetor.</p><div id="now" class="card p-3 mb-3"></div><div class="d-flex gap-2 mb-3"><button id="prev" class="btn btn-outline-secondary flex-fill">← Anterior</button><button id="next" class="btn btn-primary flex-fill">Próxima →</button></div><button id="black" class="btn btn-dark w-100 mb-3">Tela preta</button><div id="list" class="list-group"></div></main><script>const id=new URLSearchParams(location.search).get('repertoire'),api=(p,o)=>fetch('/api'+p,{headers:{'Content-Type':'application/json'},...o}).then(r=>r.json()).then(x=>{if(!x.data)throw Error(x.error?.message);return x.data});let rep,state;async function load(){[rep,state]=await Promise.all([api('/repertoires/'+id),api('/projection/'+id+'/state')]);now.innerHTML='<strong>'+state.position+'. '+rep.items[state.position-1].title+'</strong>';black.textContent=state.blackout?'Mostrar projeção':'Tela preta';list.innerHTML=rep.items.map((x,i)=>'<button class="list-group-item '+(i+1===state.position?'active':'')+'" data-p="'+(i+1)+'">'+(i+1)+'. '+x.title+'</button>').join('');list.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>save(Number(b.dataset.p),false))}async function save(position=state.position,blackout=state.blackout){await api('/projection/'+id+'/state',{method:'PUT',body:JSON.stringify({position,blackout})});load()}prev.onclick=()=>save(Math.max(1,state.position-1),false);next.onclick=()=>save(Math.min(rep.items.length,state.position+1),false);black.onclick=()=>save(state.position,!state.blackout);load()</script></body></html>
